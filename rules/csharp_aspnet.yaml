rules:
  # ── C# ASP.NET SQL Injection ───────────────────────────────────────────────
  - id: csharp-sqli-sqlcommand
    message: "Tainted input used in SQL command — potential SQL Injection"
    severity: ERROR
    languages: [csharp]
    mode: taint
    pattern-sources:
      - pattern: Request.Query[...]
      - pattern: Request.Form[...]
      - pattern: Request.Headers[...]
      - pattern: Request.Cookies[...]
      - pattern: HttpContext.Request.Query[...]
      - pattern: HttpContext.Request.Form[...]
      - patterns:
          - pattern-inside: |
              class $CLASS : Controller {
                  ...
                  public $RET $METHOD(..., $TYPE $ARG, ...) { ... }
                  ...
              }
          - focus-metavariable: $ARG
      - patterns:
          - pattern-inside: |
              class $CLASS : ControllerBase {
                  ...
                  public $RET $METHOD(..., $TYPE $ARG, ...) { ... }
                  ...
              }
          - focus-metavariable: $ARG
    pattern-sinks:
      - pattern: new SqlCommand($X, ...)
      - pattern: new SqlCommand($X)
      - pattern: $CMD.CommandText = $X
      - pattern: $CMD.CommandText += $X
    metadata:
      category: security
      cwe: CWE-89
      owasp: A03:2021

  - id: csharp-ef-sqli-fromsqlraw
    message: "Tainted input used in Entity Framework FromSqlRaw — potential SQL Injection"
    severity: ERROR
    languages: [csharp]
    mode: taint
    pattern-sources:
      - pattern: Request.Query[...]
      - pattern: Request.Form[...]
      - pattern: Request.Headers[...]
      - patterns:
          - pattern-inside: |
              class $CLASS : Controller {
                  ...
                  public $RET $METHOD(..., $TYPE $ARG, ...) { ... }
                  ...
              }
          - focus-metavariable: $ARG
      - patterns:
          - pattern-inside: |
              class $CLASS : ControllerBase {
                  ...
                  public $RET $METHOD(..., $TYPE $ARG, ...) { ... }
                  ...
              }
          - focus-metavariable: $ARG
    pattern-sinks:
      - pattern: $DB.Set<$T>().FromSqlRaw($X, ...)
      - pattern: $DB.Database.ExecuteSqlRaw($X, ...)
      - pattern: $DB.Database.ExecuteSqlCommand($X, ...)
    metadata:
      category: security
      cwe: CWE-89
      owasp: A03:2021

